<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h1 class="logo">WebSite</h1>
      <ul class="nav-links">
        <li><a href="index.html">Accueil</a></li>
      </ul>
    </div>
  </nav>

  <section class="form-section">
    <div class="form-container">
      <h2>Connexion</h2>
      <form id="connexionForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary">Se connecter</button>
      </form>
      <p>Pas encore inscrit? <a href="inscription.html">S'inscrire</a></p>
      <div id="message"></div>
    </div>
  </section>

  <script>
    document.getElementById('connexionForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      try {
        const response = await fetch('/api/auth/connexion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();
        const messageDiv = document.getElementById('message');

        if (response.ok) {
          localStorage.setItem('token', result.token);
          localStorage.setItem('user', JSON.stringify(result.user));
          messageDiv.innerHTML = '<p class="success">✅ Connexion réussie! Redirection...</p>';
          setTimeout(() => window.location.href = 'index.html', 2000);
        } else {
          messageDiv.innerHTML = `<p class="error">❌ ${result.error}</p>`;
        }
      } catch (error) {
        document.getElementById('message').innerHTML = `<p class="error">❌ Erreur: ${error.message}</p>`;
      }
    });
  </script>
</body>
</html>
