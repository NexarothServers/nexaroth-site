<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h1 class="logo">WebSite</h1>
      <ul class="nav-links">
        <li><a href="index.html">Accueil</a></li>
      </ul>
    </div>
  </nav>

  <section class="form-section">
    <div class="form-container">
      <h2>Inscription</h2>
      <form id="inscriptionForm">
        <div class="form-group">
          <label for="username">Nom d'utilisateur</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary">S'inscrire</button>
      </form>
      <p>Déjà inscrit? <a href="connexion.html">Se connecter</a></p>
      <div id="message"></div>
    </div>
  </section>

  <script>
    document.getElementById('inscriptionForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      try {
        const response = await fetch('/api/auth/inscription', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();
        const messageDiv = document.getElementById('message');

        if (response.ok) {
          messageDiv.innerHTML = '<p class="success">✅ Inscription réussie! Redirection...</p>';
          setTimeout(() => window.location.href = 'connexion.html', 2000);
        } else {
          messageDiv.innerHTML = `<p class="error">❌ ${result.error}</p>`;
        }
      } catch (error) {
        document.getElementById('message').innerHTML = `<p class="error">❌ Erreur: ${error.message}</p>`;
      }
    });
  </script>
</body>
</html>
